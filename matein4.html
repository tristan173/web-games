<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MATE IN 4 — a game of forced endings</title>
<style>
  :root{
    --void:#050912;
    --sq-dark:#081120;
    --sq-light:#0e1c2e;
    --glacier:#a8e6ff;
    --glacier-dim:#3d6a85;
    --ember:#ffb454;
    --bone:#dfeef6;
    --faint:#5d7686;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--void);
    font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    color:var(--bone);-webkit-user-select:none;user-select:none;overscroll-behavior:none}

  .screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;
    overflow-y:auto;padding:calc(20px + env(safe-area-inset-top,0px)) 16px
    calc(20px + env(safe-area-inset-bottom,0px))}
  .screen.on{display:flex}

  /* ---------- hub ---------- */
  #hub .col{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
  #wordmark{font-weight:200;font-size:clamp(23px,6.8vw,34px);letter-spacing:.32em;
    white-space:nowrap;margin:22px 0 6px .32em;color:var(--bone);
    text-shadow:0 0 30px rgba(168,230,255,.3)}
  #tagline{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--glacier)}
  #subtitle{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-top:6px}
  #datelbl{font-size:10px;letter-spacing:.2em;color:var(--faint);margin:4px 0 22px}
  .tier{width:100%;height:64px;margin-bottom:10px;border:1px solid rgba(61,106,133,.4);
    border-radius:6px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;cursor:pointer;background:none;transition:opacity .3s}
  .tier.done{opacity:.55}
  .tier:hover{border-color:var(--glacier-dim)}
  .tier .tl{text-align:left}
  .tier .tname{font-size:13px;letter-spacing:.18em;color:var(--bone);text-transform:uppercase}
  .tier .tstate{font-size:10px;letter-spacing:.12em;color:var(--faint);margin-top:4px}
  .tier .tr{display:flex;align-items:center;gap:10px}
  .tier .glyph{width:14px;height:14px;position:relative}
  .tier .flame{font-size:12px;color:var(--ember);letter-spacing:.05em}
  @keyframes breathe{0%,100%{opacity:.35}50%{opacity:1}}
  .tier .glyph.breathe{animation:breathe 2.4s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){.tier .glyph.breathe{animation:none;opacity:.85}}
  @keyframes rowpulse{0%{transform:scale(1.03)}100%{transform:scale(1)}}
  .tier.pulse{animation:rowpulse .14s ease-out}
  #sharebtn{margin-top:14px;padding:10px 26px;background:none;border:1px solid var(--glacier-dim);
    border-radius:4px;color:var(--glacier);font:inherit;font-size:12px;letter-spacing:.18em;
    cursor:pointer;display:none}
  #sharebtn.show{display:block}
  #sharebtn:hover{border-color:var(--glacier)}
  #sharebtn.breathe{animation:breathe 2.4s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){#sharebtn.breathe{animation:none}}
  #sharegrid{display:none;margin-top:12px;padding-left:2px}
  #sharegrid.show{display:inline-block}
  .jrow{display:flex;justify-content:flex-start;gap:5px;margin-bottom:5px}
  .jcell{width:16px;height:16px;border-radius:3px}
  .jcell.solve{background:#5aa86b}
  .jcell.miss{background:#d0a53a}
  .jcell.open{background:transparent;border:1px solid var(--glacier-dim);opacity:.7}
  #dayline{font-size:11px;letter-spacing:.14em;color:var(--bone);margin-top:16px;
    opacity:0;transition:opacity .5s;min-height:14px}
  #dayline.show{opacity:1}
  #dayline.ember{color:var(--ember)}
  @keyframes daypulse{0%,100%{opacity:1}50%{opacity:.4}}
  #dayline.ember.show{animation:daypulse 1.2s ease-in-out 1}
  @media (prefers-reduced-motion:reduce){#dayline.ember.show{animation:none}}
  #hubhint{font-size:11px;letter-spacing:.14em;color:var(--faint);opacity:.55;margin-top:16px}
  #hubfoot{margin-top:auto;padding-top:26px;text-align:center}
  #hubfoot .f1{font-size:10px;letter-spacing:.18em;color:var(--faint)}
  #hubfoot .f2{font-size:9px;letter-spacing:.14em;color:var(--faint);opacity:.6;margin-top:6px}

  /* ---------- board screen ---------- */
  /* flex-START, not center: the board is pinned a fixed distance below the top,
     so it can NEVER rise under the fixed back button and steal a tap. sizeBoard()
     keeps board+scorecard within the viewport so nothing scrolls under the HUD. */
  #board.screen{padding:0;justify-content:flex-start}
  #board .col{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    min-height:100%;width:100%;
    padding:calc(74px + env(safe-area-inset-top,0px)) 0 calc(54px + env(safe-area-inset-bottom,0px))}
  #cwrap{position:relative;line-height:0}
  #c{display:block;touch-action:none}
  @keyframes bshake{0%,100%{transform:translateX(0)}17%{transform:translateX(-4px)}
    50%{transform:translateX(4px)}83%{transform:translateX(-4px)}}
  #cwrap.shake{animation:bshake .18s linear}
  @media (prefers-reduced-motion:reduce){#cwrap.shake{animation:none}}
  #statusline{margin-top:14px;font-size:11px;letter-spacing:.14em;color:var(--faint);
    min-height:16px;text-align:center;transition:opacity .2s}
  @keyframes kickin{0%{opacity:0;letter-spacing:.58em}100%{opacity:1;letter-spacing:.4em}}
  #kicker.show{animation:kickin .32s ease-out}
  @media (prefers-reduced-motion:reduce){#kicker.show{animation:none}}
  #kicker.summit{text-shadow:0 0 26px rgba(255,180,84,.55),0 0 60px rgba(255,180,84,.25)}
  #kicker{font-weight:200;font-size:clamp(26px,6vw,40px);letter-spacing:.4em;
    margin-left:.4em;color:var(--bone);text-transform:uppercase;text-align:center;
    opacity:0;transition:opacity .25s;min-height:44px;margin-top:2px}
  #kicker.show{opacity:1}
  #kicksub{font-size:11px;letter-spacing:.16em;text-align:center;color:var(--faint);
    opacity:0;transition:opacity .25s;min-height:14px}
  #kicksub.show{opacity:1}
  #kicksub.glacier{color:var(--glacier);text-shadow:0 0 12px rgba(168,230,255,.4)}

  /* ---------- the streak card: bragging rights, made visible ---------- */
  #streakcard{margin-top:12px;text-align:center;opacity:0;transform:scale(.92);
    transition:opacity .35s,transform .35s;min-height:64px}
  #streakcard.show{opacity:1;transform:scale(1)}
  #skflame{font-size:30px;color:var(--ember);letter-spacing:.04em;
    text-shadow:0 0 22px rgba(255,180,84,.45)}
  #skline1{font-size:11px;letter-spacing:.18em;color:var(--bone);margin-top:6px}
  #skline2{font-size:11px;letter-spacing:.18em;color:var(--faint);margin-top:4px}
  @keyframes recpulse{0%,100%{opacity:1}50%{opacity:.45}}
  #skline2.ember{color:var(--ember);animation:recpulse 1.1s ease-in-out 3}
  @media (prefers-reduced-motion:reduce){#skline2.ember{animation:none}}
  #bhud{position:fixed;inset:0;pointer-events:none;
    padding:calc(12px + env(safe-area-inset-top,0px)) 16px calc(10px + env(safe-area-inset-bottom,0px))}
  #backbtn{position:absolute;top:calc(10px + env(safe-area-inset-top,0px));
    left:calc(12px + env(safe-area-inset-left,0px));
    pointer-events:auto;cursor:pointer;padding:8px 10px;min-width:44px;min-height:44px}
  #backname{font-size:13px;letter-spacing:.18em;color:var(--bone);text-transform:uppercase}
  #movedepth{font-size:10px;letter-spacing:.12em;color:var(--glacier-dim);
    text-transform:uppercase;margin-left:10px}
  #bstreak{position:absolute;top:calc(18px + env(safe-area-inset-top,0px));right:16px;
    font-size:13px;color:var(--ember);letter-spacing:.05em;display:none}
  @keyframes chainpulse{0%{transform:scale(1.45)}100%{transform:scale(1)}}
  #bstreak.pulse{animation:chainpulse .25s ease-out}
  @media (prefers-reduced-motion:reduce){#bstreak.pulse{animation:none}}
  /* ---------- scorecard: the line, the tries, the record ---------- */
  #scorecard{margin-top:12px;border:1px solid rgba(61,106,133,.4);border-radius:6px;
    padding:8px 12px 9px;text-align:left}
  #schead{display:flex;justify-content:space-between;align-items:center;
    padding-bottom:6px;border-bottom:1px solid rgba(61,106,133,.25);margin-bottom:6px}
  #sclabel{font-size:10px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}
  #sctries{display:flex;align-items:center;gap:8px}
  #trieslbl{font-size:10px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}
  #movelog{font-size:11.5px;letter-spacing:.1em;color:var(--faint);line-height:1.9;
    max-height:118px;overflow-y:auto}
  #movelog .mrow{display:flex;gap:14px}
  #movelog .mnum{color:var(--glacier-dim);width:16px;flex:none}
  #movelog .mv{color:var(--bone);width:74px;flex:none}
  #movelog .mh{color:var(--bone)}
  #movelog .miss{color:var(--faint)}
  #movelog .miss .mx{color:var(--glacier-dim);text-decoration:line-through}
  #movelog .miss .mwhy{opacity:.8}
  #movelog .sect{color:var(--glacier);opacity:.75;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;margin-top:4px}
  #pips{display:flex;gap:6px}
  #pips i{width:11px;height:11px;border-radius:50%;background:var(--glacier);
    box-shadow:0 0 6px rgba(168,230,255,.5);transition:background .2s,box-shadow .2s;
    position:relative}
  #pips i.spent{background:transparent;box-shadow:none;opacity:.55}
  #pips i.spent::after{content:'×';position:absolute;inset:0;color:var(--glacier-dim);
    font-size:13px;line-height:11px;text-align:center;font-style:normal}
  @keyframes pippulse{0%{transform:scale(1.45)}100%{transform:scale(1)}}
  #pips i.pulse{animation:pippulse .25s ease-out}
  #revealctas{margin-top:12px;display:flex;gap:26px;visibility:hidden;opacity:0;
    transition:opacity .25s}
  #revealctas.show{visibility:visible;opacity:1}
  .rcta{font-size:12px;letter-spacing:.2em;color:var(--glacier);cursor:pointer;padding:8px 4px}
  .rcta.breathe{animation:breathe 2.4s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){.rcta.breathe{animation:none;opacity:.85}}
  #staticback{margin-top:12px;font-size:12px;letter-spacing:.2em;color:var(--glacier);
    cursor:pointer;display:none;padding:8px 4px}
  #staticback.show{display:block}

  /* ---------- promotion picker ---------- */
  #promo{position:absolute;display:none;flex-direction:column;background:#0a1522;
    border:1px solid rgba(168,230,255,.35);border-radius:4px;z-index:5}
  #promo.show{display:flex}
  #promo canvas{display:block;cursor:pointer}
  #promodim{position:absolute;inset:0;background:rgba(5,9,18,.6);display:none;z-index:4}
  #promodim.show{display:block}

  /* ---------- sound toggle ---------- */
  /* ---------- dev bar (matein4.html?tune — tuning phase only) ---------- */
  #devbar{position:fixed;left:calc(12px + env(safe-area-inset-left,0px));
    bottom:calc(64px + env(safe-area-inset-bottom,0px));display:flex;gap:8px;z-index:9;
    align-items:center;flex-wrap:wrap;max-width:70vw}
  #devbar span{color:var(--faint);font-size:10px;letter-spacing:.14em}
  #devbar button{background:rgba(5,9,18,.7);border:1px solid var(--glacier-dim);
    color:var(--glacier);font:inherit;font-size:11px;letter-spacing:.14em;
    padding:8px 12px;cursor:pointer;border-radius:4px}
  #devbar button:hover{border-color:var(--glacier)}

  #snd{position:fixed;right:calc(10px + env(safe-area-inset-right,0px));
    bottom:calc(8px + env(safe-area-inset-bottom,0px));
    min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--faint);font-size:11px;letter-spacing:.18em;z-index:9}
  #snd:hover{color:var(--glacier)}
  #snd.off{opacity:.35;text-decoration:line-through}
</style>
</head>
<body>

<div id="hub" class="screen on">
  <div class="col">
    <div id="wordmark">MATE IN 4</div>
    <div id="tagline">a game of forced endings</div>
    <div id="subtitle">one board a day</div>
    <div id="datelbl"></div>
    <div id="tiers" style="width:100%"></div>
    <button id="sharebtn">share today</button>
    <div id="sharegrid"></div>
    <div id="dayline"></div>
    <div id="hubhint"></div>
    <div id="hubfoot">
      <div class="f1">new boards at midnight utc</div>
      <div class="f2">puzzles: lichess.org (CC0)</div>
    </div>
  </div>
</div>

<div id="board" class="screen">
  <div class="col">
    <div id="cwrap">
      <canvas id="c"></canvas>
      <div id="promodim"></div>
      <div id="promo"></div>
    </div>
    <div id="statusline"></div>
    <div id="scorecard">
      <div id="schead">
        <span><span id="sclabel">the line</span><span id="movedepth"></span></span>
        <span id="sctries"><span id="trieslbl">tries</span><span id="pips"></span></span>
      </div>
      <div id="movelog"></div>
    </div>
    <div id="kicker"></div>
    <div id="kicksub"></div>
    <div id="streakcard">
      <div id="skflame"></div>
      <div id="skline1"></div>
      <div id="skline2"></div>
    </div>
    <div id="revealctas">
      <div class="rcta" id="watchagain">watch again</div>
      <div class="rcta breathe" id="backboards">back to boards</div>
    </div>
    <div id="staticback">‹ back</div>
  </div>
  <div id="bhud">
    <div id="backbtn">
      <div id="backname">‹ MATE IN 1</div>
    </div>
    <div id="bstreak"></div>
  </div>
</div>

<div id="snd" title="sound (M)">SND</div>

<script>
'use strict';
/* ============================================================
   MATE IN 4 — a game of forced endings
   One board a day. Single file. No dependencies. No build step.
   Chess engine first (pure, testable), then the theater.
   ============================================================ */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const $=id=>document.getElementById(id);
const REDUCED=matchMedia('(prefers-reduced-motion:reduce)').matches;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ============================================================
   engine — 0x88 board. piece codes: 1P 2N 3B 4R 5Q 6K, +white -black
   ============================================================ */
const N_OFF=[31,33,14,18,-31,-33,-14,-18];
const K_OFF=[1,-1,16,-16,15,17,-15,-17];
const B_RAY=[15,17,-15,-17];
const R_RAY=[1,-1,16,-16];
const PIECE_CH={p:1,n:2,b:3,r:4,q:5,k:6};

function parseFEN(fen){
  const parts=fen.split(' ');
  const b=new Int8Array(128);
  const rows=parts[0].split('/');
  for(let i=0;i<8;i++){
    let f=0;
    for(const ch of rows[i]){
      if(ch>='1'&&ch<='8'){ f+=+ch; continue; }
      const lo=ch.toLowerCase();
      b[(7-i)*16+f]=PIECE_CH[lo]*(ch===lo?-1:1);
      f++;
    }
  }
  let castle=0;
  if(parts[2]&&parts[2]!=='-'){
    if(parts[2].includes('K'))castle|=1;
    if(parts[2].includes('Q'))castle|=2;
    if(parts[2].includes('k'))castle|=4;
    if(parts[2].includes('q'))castle|=8;
  }
  const ep=(parts[3]&&parts[3]!=='-')?sqFromName(parts[3]):-1;
  return {b, stm:parts[1]==='w'?1:-1, castle, ep};
}
function sqFromName(n){ return (n.charCodeAt(1)-49)*16+(n.charCodeAt(0)-97); }
function sqName(s){ return String.fromCharCode(97+(s&7))+String.fromCharCode(49+(s>>4)); }
function cloneState(st){ return {b:new Int8Array(st.b), stm:st.stm, castle:st.castle, ep:st.ep}; }

function isAttacked(st,sq,by){
  const b=st.b;
  // pawns: a white pawn on sq-15/sq-17 attacks sq
  if(by===1){ for(const o of [15,17]){ const f=sq-o; if(!(f&0x88)&&b[f]===1) return true; } }
  else { for(const o of [15,17]){ const f=sq+o; if(!(f&0x88)&&b[f]===-1) return true; } }
  for(const o of N_OFF){ const f=sq+o; if(!(f&0x88)&&b[f]===2*by) return true; }
  for(const o of K_OFF){ const f=sq+o; if(!(f&0x88)&&b[f]===6*by) return true; }
  for(const o of B_RAY){
    let f=sq+o;
    while(!(f&0x88)){
      const p=b[f];
      if(p){ if(p===3*by||p===5*by) return true; break; }
      f+=o;
    }
  }
  for(const o of R_RAY){
    let f=sq+o;
    while(!(f&0x88)){
      const p=b[f];
      if(p){ if(p===4*by||p===5*by) return true; break; }
      f+=o;
    }
  }
  return false;
}
function kingSq(st,side){
  for(let s=0;s<128;s++){ if(!(s&0x88)&&st.b[s]===6*side) return s; }
  return -1;
}
function inCheck(st,side){ return isAttacked(st,kingSq(st,side),-side); }

function makeMove(st,m){
  const n=cloneState(st);
  const b=n.b, side=st.stm, p=b[m.from];
  b[m.to]=m.promo?PIECE_CH[m.promo]*side:p;
  b[m.from]=0;
  if(m.ep) b[m.to-16*side]=0;                                  // en passant capture
  if(m.castle==='K'){ b[m.from+1]=4*side; b[m.from+3]=0; }     // rook h->f
  if(m.castle==='Q'){ b[m.from-1]=4*side; b[m.from-4]=0; }     // rook a->d
  // castling rights decay when king/rook squares are touched
  const touch=s=>{
    if(s===4)n.castle&=~3; if(s===7)n.castle&=~1; if(s===0)n.castle&=~2;
    if(s===116)n.castle&=~12; if(s===119)n.castle&=~4; if(s===112)n.castle&=~8;
  };
  touch(m.from); touch(m.to);
  n.ep=(Math.abs(p)===1&&Math.abs(m.to-m.from)===32)?(m.from+m.to)/2:-1;
  n.stm=-side;
  return n;
}

function genMoves(st){
  const b=st.b, side=st.stm, out=[];
  const push=(from,to,extra)=>{
    const mv=Object.assign({from,to},extra);
    const nx=makeMove(st,mv);
    if(!inCheck(nx,side)) out.push(mv);
  };
  const pawnTo=(from,to,ep)=>{
    const rank=to>>4;
    if((side===1&&rank===7)||(side===-1&&rank===0)){
      for(const pr of ['q','r','b','n']) push(from,to,{promo:pr,ep});
    } else push(from,to,{ep});
  };
  for(let s=0;s<128;s++){
    if(s&0x88) continue;
    const p=b[s];
    if(!p||Math.sign(p)!==side) continue;
    const t=Math.abs(p);
    if(t===1){
      const fwd=s+16*side;
      if(!(fwd&0x88)&&!b[fwd]){
        pawnTo(s,fwd,false);
        const startRank=side===1?1:6;
        const dbl=s+32*side;
        if((s>>4)===startRank&&!b[dbl]) pawnTo(s,dbl,false);
      }
      for(const o of [15,17]){
        const cap=s+o*side;
        if(cap&0x88) continue;
        if(b[cap]&&Math.sign(b[cap])===-side) pawnTo(s,cap,false);
        else if(cap===st.ep) pawnTo(s,cap,true);
      }
    } else if(t===2||t===6){
      for(const o of (t===2?N_OFF:K_OFF)){
        const to=s+o;
        if(to&0x88) continue;
        if(!b[to]||Math.sign(b[to])===-side) push(s,to);
      }
      if(t===6){
        // castling: king on its home square with rights, path empty + unattacked
        const home=side===1?4:116;
        if(s===home&&!isAttacked(st,home,-side)){
          const kBit=side===1?1:4, qBit=side===1?2:8;
          if((st.castle&kBit)&&!b[home+1]&&!b[home+2]
            &&b[home+3]===4*side
            &&!isAttacked(st,home+1,-side)&&!isAttacked(st,home+2,-side))
            push(home,home+2,{castle:'K'});
          if((st.castle&qBit)&&!b[home-1]&&!b[home-2]&&!b[home-3]
            &&b[home-4]===4*side
            &&!isAttacked(st,home-1,-side)&&!isAttacked(st,home-2,-side))
            push(home,home-2,{castle:'Q'});
        }
      }
    } else {
      const rays=t===3?B_RAY:t===4?R_RAY:K_OFF;
      for(const o of rays){
        let to=s+o;
        while(!(to&0x88)){
          if(!b[to]) push(s,to);
          else { if(Math.sign(b[to])===-side) push(s,to); break; }
          to+=o;
        }
      }
    }
  }
  return out;
}
function isMate(st){ return inCheck(st,st.stm)&&genMoves(st).length===0; }
function isStalemate(st){ return !inCheck(st,st.stm)&&genMoves(st).length===0; }
function uciToMove(st,uci){
  const from=sqFromName(uci.slice(0,2)), to=sqFromName(uci.slice(2,4));
  const promo=uci[4]||null;
  return genMoves(st).find(m=>m.from===from&&m.to===to&&(promo?m.promo===promo:!m.promo))||null;
}
function moveToUci(m){ return sqName(m.from)+sqName(m.to)+(m.promo||''); }
function sanLite(stt,m){                        // compact algebraic for status lines
  if(m.castle) return m.castle==='K'?'o-o':'o-o-o';
  const p=Math.abs(stt.b[m.from]);
  const cap=stt.b[m.to]!==0||m.ep;
  const dest=sqName(m.to)+(m.promo?'='+m.promo:'');
  if(p===1) return cap?sqName(m.from)[0]+'x'+dest:dest;
  return '  nbrqk'[p]+(cap?'x':'')+dest;      // codes: 2N 3B 4R 5Q 6K
}
function perft(st,d){
  if(d===0) return 1;
  let n=0;
  for(const m of genMoves(st)) n+=perft(makeMove(st,m),d-1);
  return n;
}

function pickIndex(days,tier,count){
  // stride walk: tier lists are rating-sorted, so a bare +1/day would creep from
  // easiest to hardest over two years; a coprime stride samples the whole range
  return (((days*331)+tier*199)%count+count)%count;
}
function puzzleFor(days,tier){
  const list=PUZZLES[tier];
  return list[pickIndex(days,+tier,list.length)];
}
const store={
  get(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} },
};
function pruneOld(today){
  try{
    const dead=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      const m=k&&k.match(/^matein4\.(done|fin|swept|log)\.(\d{4}-\d{2}-\d{2})(\.|$)/);
      if(m&&(new Date(today)-new Date(m[2]))/86400000>2) dead.push(k);
    }
    dead.forEach(k=>localStorage.removeItem(k));
  }catch(e){}
}
function yesterdayOf(dk){
  const d=new Date(dk+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()-1);
  return d.toISOString().slice(0,10);
}
function liveStreak(tier,today){
  const raw=store.get('matein4.streak.'+tier,'');
  const m=raw.match(/^(\d+)\|(\d{4}-\d{2}-\d{2})$/);
  if(!m) return 0;
  const count=+m[1], date=m[2];
  if(date===today||date===yesterdayOf(today)) return count;   // lazy zero
  return 0;
}
function recordSolve(tier,today){
  const raw=store.get('matein4.streak.'+tier,'');
  const m=raw.match(/^(\d+)\|(\d{4}-\d{2}-\d{2})$/);
  const count=(m&&m[2]===yesterdayOf(today))?+m[1]+1:1;
  store.set('matein4.streak.'+tier,count+'|'+today);
  const prevBest=+store.get('matein4.best.'+tier,'0');
  if(count>prevBest) store.set('matein4.best.'+tier,''+count);
  store.set('matein4.hist.'+tier,''+(+store.get('matein4.hist.'+tier,'0')+1));
  return {count, prevBest, isRecord:count>prevBest&&count>=3};
}
let lastStreakDeath=null;
function recordFail(tier,today){
  const died=liveStreak(tier,today);           // best already covers it (set on each increment)
  store.set('matein4.streak.'+tier,'0|'+today);
  lastStreakDeath=died>=2?{n:died,best:+store.get('matein4.best.'+tier,'0')}:null;
}

/* ============================================================
   audio — tiny synth, built on first gesture (Drift's chain)
   ============================================================ */
let AC=null, master=null, muted=false, audioUnlocked=false;
function audioInit(){
  try{
    if(!AC){
      AC=new (window.AudioContext||window.webkitAudioContext)();
      const comp=AC.createDynamicsCompressor();
      comp.threshold.value=-18; comp.ratio.value=4;
      comp.connect(AC.destination);
      master=AC.createGain(); master.gain.value=muted?0:0.5; master.connect(comp);
    }
    if(AC.state!=='running') AC.resume();          // iOS births it suspended — wake it in the gesture
    if(!audioUnlocked){                            // and play a silent tick so iOS truly unlocks
      const b=AC.createBuffer(1,1,22050), s=AC.createBufferSource();
      s.buffer=b; s.connect(AC.destination); s.start(0);
      audioUnlocked=true;
    }
  }catch(e){ AC=null; }
}
function pluck(freq,gain,decay,when,type){
  if(!AC) return;
  const t=Math.max(AC.currentTime,when||AC.currentTime);
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'triangle'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+decay);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+decay+0.05);
}
function thud(){
  if(!AC) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sine'; o.frequency.setValueAtTime(170,t);
  o.frequency.exponentialRampToValueAtTime(110,t+0.12);
  g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+0.2);
}

const sConfirm=()=>pluck(659,0.12,0.12);

function sSolve(perfect,summit){
  if(!AC)return; const t=AC.currentTime;
  pluck(523,0.22,0.2,t); pluck(659,0.22,0.2,t+0.11); pluck(784,0.22,0.2,t+0.22);

}

    x.lineTo(62,24); x.lineTo(52,29);
    x.bezierCurveTo(48,20,38,17,33,23);
    x.bezierCurveTo(29,28,31,33,34,36);

    x.moveTo(36,62); x.lineTo(64,62); x.lineTo(68,76); x.lineTo(32,76); x.closePath();
    x.moveTo(28,79); x.lineTo(72,79); x.lineTo(72,87); x.lineTo(28,87); x.closePath();
  } else if(t===5){ // queen — deep spiked crown, nothing like the rook's flat crenels
    x.moveTo(30,46); x.lineTo(33,15); x.lineTo(43,34); x.lineTo(50,11); x.lineTo(57,34);
    x.lineTo(67,15); x.lineTo(70,46); x.closePath();
    x.moveTo(35,50); x.lineTo(65,50); x.lineTo(61,76); x.lineTo(39,76); x.closePath();
    x.moveTo(30,79); x.lineTo(70,79); x.lineTo(70,87); x.lineTo(30,87); x.closePath();

const PIECE_H={1:0.68,2:0.84,3:0.88,4:0.78,5:0.96,6:1.0};  // real sets stagger heights: K>Q>B>N>R>P
function drawPiece(x,piece,cx,cy,size,alpha){
  const t=Math.abs(piece), white=piece>0;
  const k=PIECE_H[t];
  x.save();
  // uniform shrink per piece rank, re-centered, bases sharing one baseline —
  // small pieces stay proportional instead of squashing
  x.translate(cx-size*k/2,cy+size*0.46-size*k*0.87);
  x.scale(size*k/100,size*k/100);
  x.globalAlpha=alpha===undefined?1:alpha;
  if(white){ x.fillStyle='#dfeef6'; tracePiece(x,t); x.fill(); }
  else{
    x.fillStyle='#1b2f47'; tracePiece(x,t); x.fill();
    x.strokeStyle='rgba(168,230,255,.65)'; x.lineWidth=2.2; tracePiece(x,t); x.stroke();
  }
  // the one interior detail: queen's crown notch / bishop's mitre slit
  if(t===5||t===3){
    x.globalCompositeOperation='destination-out';
    x.beginPath();
    if(t===5) x.arc(50,43,3.2,0,7);
    else{ x.save(); x.translate(50,38); x.rotate(0.6); x.rect(-1.8,-14,3.6,22); x.restore(); }
    x.fill();
    x.globalCompositeOperation='source-over';
  }
  x.restore();
}

function triesFor(t){ return t; }                // MATE IN N grants N tries — the ladder IS the name
function doneVal(t){

  if(/^p\d+$/.test(v)&&+v.slice(1)>=triesFor(t)) return 'f';   // defensive: out of tries IS a fail

function stateLine(v,t){

function glyphSVG(v){
  if(v==='0') return '<svg width="14" height="14"><circle cx="7" cy="7" r="4.5" fill="#a8e6ff"/><circle cx="7" cy="7" r="6.5" fill="none" stroke="rgba(168,230,255,.35)" stroke-width="1"/></svg>';
  if(/^[123]$/.test(v)) return '<svg width="14" height="14"><circle cx="7" cy="7" r="4.5" fill="#a8e6ff"/></svg>';
  if(v==='f') return '<svg width="14" height="14"><path d="M3 3 L11 11 M11 3 L3 11" stroke="#5d7686" stroke-width="1.5"/></svg>';
  return '<svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="none" stroke="#a8e6ff" stroke-width="1.5"/></svg>';
}
function journeyCells(t){
  // every tier shows ALL its tries (the 1·2·3·4 ladder made visible):
  // miss = a spent wrong try · solve = the winning try · open = a try still available
  const v=doneVal(t), n=triesFor(t), cells=[];
  let misses=0, solved=false, failed=false;
  if(v==='0') solved=true;
  else if(/^[123]$/.test(v)){ misses=+v; solved=true; }
  else if(v==='f'){ misses=n; failed=true; }
  else if(/^p\d+$/.test(v)) misses=+v.slice(1);
  for(let i=0;i<n;i++){
    if(i<misses) cells.push('miss');
    else if(solved&&i===misses) cells.push('solve');
    else cells.push('open');            // available, untaken — the ladder's promise
  }
  return cells;
}
function journeyRowsEmoji(){
  const glyph={miss:'🟨',solve:'🟩',open:'⬛'};   // ⬛ = an empty, unused try slot
  const rows=[];
  for(let t=1;t<=4;t++) rows.push(journeyCells(t).map(c=>glyph[c]).join(''));
  return rows;
}

function sizeBoard(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  // reserve the top HUD band + bottom band + scorecard/status so the board+card
  // ALWAYS fit the viewport — nothing scrolls, so the board can never slide
  // up under the fixed back button and eat a tap.
  const topBand=74, bottomBand=54, cardReserve=176;
  const hFit=innerHeight-topBand-bottomBand-cardReserve;
  BOARD=Math.min(innerWidth*0.94,hFit,460);
  BOARD=Math.max(240,Math.floor(BOARD/8)*8);   // never absurdly tiny
  SQ=BOARD/8;
  cvs.width=BOARD*DPR; cvs.height=BOARD*DPR;
  cvs.style.width=BOARD+'px'; cvs.style.height=BOARD+'px';
  $('scorecard').style.width=BOARD+'px';       // the record sits flush under the board
  $('statusline').style.width=BOARD+'px';
}
function sqToXY(s){
  const f=s&7, r=s>>4;
  const col=flip?7-f:f, row=flip?r:7-r;
  return [col*SQ, row*SQ];
}
function xyToSq(x,y){
  const col=Math.floor(x/SQ), row=Math.floor(y/SQ);
  if(col<0||col>7||row<0||row>7) return -1;
  const f=flip?7-col:col, r=flip?row:7-row;   // exact inverse of sqToXY
  return r*16+f;
}
const easeOut=t=>1-(1-t)*(1-t);
const easeIn=t=>t*t;

function draw(){
  const now=performance.now();
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // squares
  for(let r=0;r<8;r++) for(let f=0;f<8;f++){
    const s=r*16+f, [x,y]=sqToXY(s);
    ctx.fillStyle=((f+r)%2===0)?'#081120':'#0e1c2e';
    ctx.fillRect(x,y,SQ,SQ);
  }
  // last-move wash
  if(lastMove){
    ctx.fillStyle='rgba(168,230,255,.12)';
    for(const s of [lastMove.from,lastMove.to]){
      const [x,y]=sqToXY(s); ctx.fillRect(x,y,SQ,SQ);
    }
  }
  // selection
  if(selected>=0){
    const [x,y]=sqToXY(selected);
    ctx.fillStyle='rgba(168,230,255,.12)'; ctx.fillRect(x,y,SQ,SQ);
    ctx.strokeStyle='#a8e6ff'; ctx.lineWidth=1.5;
    ctx.strokeRect(x+1,y+1,SQ-2,SQ-2);
  }
  // effects under pieces (blooms, flashes)
  effects=effects.filter(e=>{
    const t=(now-e.t0)/e.dur;
    if(t>=1) return false;
    const [x,y]=sqToXY(e.sq), cx=x+SQ/2, cy=y+SQ/2;
    if(e.type==='bloom'){
      const r=easeOut(t)*(e.r||1.4)*SQ;
      const g=ctx.createRadialGradient(cx,cy,1,cx,cy,Math.max(r,1));
      g.addColorStop(0,'rgba(255,180,84,'+(0.55*(1-t))+')');
      g.addColorStop(1,'rgba(255,180,84,0)');
      ctx.fillStyle=g; ctx.fillRect(cx-r,cy-r,r*2,r*2);
    } else if(e.type==='gflash'){
      const cycle=((now-e.t0)/(e.dur/(e.pulses||1)))%1;
      const a=0.35*Math.sin(Math.PI*cycle);
      ctx.fillStyle='rgba(168,230,255,'+Math.max(0,a).toFixed(3)+')';
      const [fx,fy]=sqToXY(e.sq); ctx.fillRect(fx,fy,SQ,SQ);
    } else if(e.type==='ring'){
      const r=easeOut(t)*SQ*0.9+SQ*0.2;
      ctx.strokeStyle='rgba(168,230,255,'+(0.7*(1-t)).toFixed(3)+')';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
    } else if(e.type==='edge'){
      // the summit: the board's own frame goes warm, once, by your hand
      const a=(1-t);
      ctx.strokeStyle='rgba(255,180,84,'+(0.75*a).toFixed(3)+')';
      ctx.lineWidth=2.5;
      ctx.strokeRect(1.5,1.5,BOARD-3,BOARD-3);
      ctx.strokeStyle='rgba(255,180,84,'+(0.25*a).toFixed(3)+')';
      ctx.lineWidth=7;
      ctx.strokeRect(4,4,BOARD-8,BOARD-8);
    }
    return true;
  });
  // pieces
  const movingFrom={};
  anims=anims.filter(a=>{
    const t=clamp((now-a.t0)/a.dur,0,1);
    if(a.type==='slide'){ movingFrom[a.hideSq]=true;
      if(t>=1){ if(a.onEnd){const f=a.onEnd; a.onEnd=null; f();} return false; } }
    if(a.type==='fadein'){ if(t>=1) return false; if(a.hideSq!==undefined) movingFrom[a.hideSq]=true; }
    if(a.type==='fadeout'&&t>=1) return false;
    return true;
  });
  for(let r=0;r<8;r++) for(let f=0;f<8;f++){
    const s=r*16+f, p=st?st.b[s]:0;
    if(!p||movingFrom[s]) continue;
    if(fallKing&&fallKing.sq===s) continue;
    const [x,y]=sqToXY(s);
    let scale=1;
    if(selected===s) scale=1.06;
    drawPiece(ctx,p,x+SQ/2,y+SQ/2,SQ*0.78*scale);
  }
  // animated pieces on top
  for(const a of anims){
    const t=clamp((now-a.t0)/a.dur,0,1);
    if(a.type==='slide'){
      const [fx,fy]=sqToXY(a.from), [tx,ty]=sqToXY(a.to);
      const e=easeOut(t);
      drawPiece(ctx,a.piece,fx+SQ/2+(tx-fx)*e,fy+SQ/2+(ty-fy)*e,SQ*0.78);
    } else if(a.type==='fadeout'){
      const [x,y]=sqToXY(a.sq);
      drawPiece(ctx,a.piece,x+SQ/2,y+SQ/2,SQ*0.78,1-t);
    } else if(a.type==='fadein'){
      const [x,y]=sqToXY(a.sq);
      drawPiece(ctx,a.piece,x+SQ/2,y+SQ/2,SQ*0.78,t);
    }
  }
  // the falling king
  if(fallKing){
    const fd=fallKing.dur||400;
    const t=clamp((now-fallKing.t0)/fd,0,1);
    let ang=easeIn(t)*75;
    if(t>=1){ const rb=clamp((now-fallKing.t0-fd)/80,0,1); ang=75-4*Math.sin(Math.PI*rb); }
    const [x,y]=sqToXY(fallKing.sq);
    ctx.save();
    ctx.translate(x+SQ/2,y+SQ/2+SQ*0.39);
    ctx.rotate((flip?-ang:ang)*Math.PI/180*(REDUCED?0:1));
    ctx.globalAlpha=REDUCED?0.4:1;
    drawPiece(ctx,fallKing.piece,0,-SQ*0.39,SQ*0.78);
    ctx.restore();
  }
  // legal target dots/rings (over pieces)
  if(selected>=0){
    for(const m of legalTargets){
      const [x,y]=sqToXY(m.to), cx=x+SQ/2, cy=y+SQ/2;
      if(st.b[m.to]||m.ep){
        ctx.strokeStyle='rgba(168,230,255,.55)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(cx,cy,SQ*0.44,0,7); ctx.stroke();
      } else {
        ctx.fillStyle='rgba(168,230,255,.5)';
        ctx.beginPath(); ctx.arc(cx,cy,SQ*0.14,0,7); ctx.fill();
      }
    }
  }
  // board frame
  ctx.strokeStyle='rgba(168,230,255,.35)'; ctx.lineWidth=1;
  ctx.strokeRect(0.5,0.5,BOARD-1,BOARD-1);
}

requestAnimationFrame(loop);

function slideAnim(m,dur,onEnd){
  // capture ghost: fades out starting at 60% of the slide
  const victim=m.ep?st.b[m.to-16*st.stm]:st.b[m.to];
  const victimSq=m.ep?m.to-16*st.stm:m.to;
  const side=st.stm, g=gen;
  anims.push({type:'slide',piece:st.b[m.from],from:m.from,to:m.to,hideSq:m.to,
    t0:performance.now(),dur:REDUCED?80:dur,onEnd});
  if(m.castle){                                // the rook rides along
    const rf=m.castle==='K'?m.from+3:m.from-4;
    const rt=m.castle==='K'?m.from+1:m.from-1;
    anims.push({type:'slide',piece:4*side,from:rf,to:rt,hideSq:rt,
      t0:performance.now(),dur:REDUCED?80:dur});
  }
  if(victim) setTimeout(()=>{
    if(gen!==g) return;                        // never haunt the next board
    anims.push({type:'fadeout',piece:victim,sq:victimSq,t0:performance.now(),dur:120});
  },(REDUCED?80:dur)*0.6);
}
async function openTier(t){
  const before=today; refreshDay();
  if(today!==before){ renderHub(); return; }   // a stale tap on a dead day only refreshes the hub
  const v=doneVal(t);
  tier=t; days=daysUTC(nowMs());
  puzzle=puzzleFor(days,String(t));   // ?tune "next boards" shifts days via devShift already
  const myGen=++gen;
  if(/^[0123]$/.test(v)) return openStatic(t,v);
  if(v==='f') return openReveal(t,true);
  // fresh or in-progress
  misses=/^p\d+$/.test(v)?+v.slice(1):0;
  mode='play';
  await boardIntro(myGen);
}

async function boardIntro(myGen){
  enterBoardScreen();

  st=parseFEN(puzzle[0]);

  hudPips(); hudDepth(); hudStreak();

function findRefutation(prev){
  // prev = state after the wrong move: defender to move, in check, not mate.
  // any legal reply here resolves the check, so it is an honest refutation;
  // preference per spec: king move -> capture -> block.
  const moves=genMoves(prev);
  const kSq=kingSq(prev,prev.stm);
  let king=null,capture=null,block=null;
  for(const mv of moves){
    if(mv.from===kSq){ if(!king) king=mv; }
    else if(prev.b[mv.to]&&Math.sign(prev.b[mv.to])===-prev.stm){ if(!capture) capture=mv; }
    else if(!block) block=mv;
  }
  return king||capture||block||moves[0];
}
async function missBeat(m,next,myGen){
  misses++;

  // anti-scum: written the instant it happens — and the final miss IS the fail,
  // so quitting during the fail choreography can never refund the tries
  const out=misses>=triesFor(tier);
  store.set('matein4.done.'+dk+'.'+tier,out?'f':'p'+misses);
  if(out) recordFail(tier,dk);
  const defenderChecked=inCheck(next,next.stm);
  const defenderStuck=genMoves(next).length===0;
  const left=triesFor(tier)-misses;
  let ref=null, line;
  if(defenderChecked&&!defenderStuck){
    // the honest refutation, named in notation and about to be PLAYED on the board
    ref=findRefutation(next);
    const kind=ref.from===kingSq(next,next.stm)?'it escapes'
      :(next.b[ref.to]||ref.ep)?'answered':'blocked';
    line=kind+' · '+sanLite(next,ref);
  }
  else if(defenderStuck) line='stalemate';
  else line='not forcing';
  await sleep(250); if(gen!==myGen) return;
  $('cwrap').classList.add('shake');
  setTimeout(()=>$('cwrap').classList.remove('shake'),200);
  sMiss();
  if(navigator.vibrate) navigator.vibrate(20);
  status(line+' · '+left+' left',true);
  logPush({t:'x',san:lastSan+(defenderChecked?'+':''),why:line,left});
  hudPips();
  const pipEl=$('pips').children[triesFor(tier)-misses];
  if(pipEl){ pipEl.classList.add('pulse'); setTimeout(()=>pipEl.classList.remove('pulse'),300); }
  if(ref){
    // don't hint the answer — play it. seeing the reply IS the argument.
    await sleep(300); if(gen!==myGen) return;
    thud();
    lastMove={from:ref.from,to:ref.to};
    const afterRef=makeMove(next,ref);
    await new Promise(res=>{ slideAnim(ref,300,res); st=afterRef; });
    if(gen!==myGen) return;
    effects.push({type:'gflash',sq:ref.to,t0:performance.now(),dur:350,pulses:1});
    await sleep(650);                          // the lesson hangs in the air
    if(gen!==myGen) return;
  }
  // the rewind: history unwinds in reverse order — their reply first, then yours
  st=replayTo(solIdx);
  const t0=performance.now();
  if(ref)
    anims.push({type:'slide',piece:st.b[ref.from],from:ref.to,to:ref.from,hideSq:ref.from,
      t0,dur:REDUCED?80:240});
  const pDelay=ref?(REDUCED?100:260):0;
  anims.push({type:'slide',piece:st.b[m.from],from:m.to,to:m.from,hideSq:m.from,
    t0:t0+pDelay,dur:REDUCED?80:240});
  const victimSq=m.ep?m.to-16*playerSide:m.to;
  if(st.b[victimSq])                          // the captured piece fades back in
    anims.push({type:'fadein',piece:st.b[victimSq],sq:victimSq,hideSq:victimSq,
      t0:t0+pDelay,dur:REDUCED?80:240});
  lastMove=solIdx>1?lastMoveOfReplay():lastSetupMove();
  await sleep(pDelay+(REDUCED?100:260));
  if(gen!==myGen) return;
  if(misses>=triesFor(tier)) return failBeat(myGen);
  status(sideWord(),true);   // the scorecard keeps the record; the status returns to duty
  locked=false;
}

function fenOf(s){
  let out='';
  for(let r=7;r>=0;r--){
    let empty=0;
    for(let f=0;f<8;f++){
      const p=s.b[r*16+f];
      if(!p){ empty++; continue; }
      if(empty){ out+=empty; empty=0; }
      const ch='pnbrqk'[Math.abs(p)-1];
      out+=p>0?ch.toUpperCase():ch;
    }
    if(empty) out+=empty;
    if(r) out+='/';
  }
  return out+' '+(s.stm===1?'w':'b')+' - - 0 1';
}

async function runReveal(myGen){

    if(isPlayer) sRevealMove(); else thud();

    if(gen!==myGen) return;
    logPush({t:isPlayer?'h':'v',san:mvSan+markFor(st)},false);
    if(i===sol.length-1){
      // the mate: cold flash, low tone, the king still falls
      effects.push({type:'gflash',sq:kingSq(st,st.stm),t0:performance.now(),dur:300,pulses:1});
      sLowTone();
      fallKing={sq:kingSq(st,st.stm),piece:st.b[kingSq(st,st.stm)],t0:performance.now()};
      await sleep(500);

function legacyCopy(text){                        // works over LAN http, inside the tap gesture
  try{
    const ta=document.createElement('textarea');
    ta.value=text; ta.contentEditable='true'; ta.readOnly=false;
    ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
    document.body.appendChild(ta);
    const range=document.createRange(); range.selectNodeContents(ta);
    const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    ta.setSelectionRange(0,text.length);         // the combo iOS Safari actually honors
    const ok=document.execCommand('copy');
    sel.removeAllRanges(); document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}

  $('devstreak').addEventListener('click',()=>prime(7,12));   // solve -> day 8 · fail -> 7-day funeral
  $('devrecord').addEventListener('click',()=>prime(12,12));  // solve -> 13 = record streak
  $('devreset').addEventListener('click',()=>{ gen++; wipeToday(); hubArrive(); devSync(); });
  $('devshuffle').addEventListener('click',()=>{
    gen++; devShift+=86400000;                 // time-travel one day: real new boards
    today=dateKeyOf(nowMs()); days=daysUTC(nowMs());
    hubArrive(); devSync();
  });
  devSync();
}

if(muted) $('snd').classList.add('off');
days=daysUTC(nowMs());
renderHub();
</script>
